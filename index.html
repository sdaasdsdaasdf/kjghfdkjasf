<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Predictor — Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="logo" onclick="window.location.href='index.html'">
    <span class="logo-dot"></span>Crypto Predictor
  </div>
  <div class="controls">
    <select id="timeframeSelect">
      <option value="15m">15 min</option>
      <option value="1h" selected>1 hour</option>
      <option value="4h">4 hours</option>
      <option value="1d">1 day</option>
    </select>
    <button class="btn" id="scanBtn" onclick="loadScanner()">Scan All Coins</button>
    <span class="badge neutral" id="scanStatus">Ready</span>
  </div>
</div>

<div class="main">
  <!-- Scanner Table -->
  <div class="panel" style="grid-column: 1 / -1;">
    <div class="panel-title">Market Scanner</div>
    <div class="table-wrap">
      <table class="scanner-table">
        <thead>
          <tr>
            <th>Coin</th>
            <th>Price</th>
            <th>Direction</th>
            <th>Conf.</th>
            <th>Bull Case</th>
            <th>Bear Case</th>
            <th>Trend</th>
            <th>Regime</th>
            <th>Fear</th>
            <th>CVD</th>
            <th>Whales</th>
          </tr>
        </thead>
        <tbody id="scannerBody">
          <tr><td colspan="11" class="empty-state">Click "Scan All Coins" to load predictions</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">
  Predictions are probabilistic estimates — not financial advice. Data: OKX · Binance · Deribit · Bybit
</div>

<div class="overlay hidden" id="loadingOverlay">
  <div class="spinner"></div>
  <span style="color:var(--text2);" id="loadingText">Scanning market data…</span>
</div>

<script src="app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => loadScanner());
</script>
</body>
</html>
